events {
    worker_connections 1024;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name meepo.su www.meepo.su;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect to HTTPS (enable after SSL is set up)
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name meepo.su www.meepo.su;

        ssl_certificate /etc/letsencrypt/live/meepo.su/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/meepo.su/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        client_max_body_size 10M;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com https://telegram.org https://oauth.telegram.org; style-src 'self' 'unsafe-inline' https://accounts.google.com https://fonts.googleapis.com https://oauth.telegram.org; img-src 'self' data: blob: https://*.googleusercontent.com https://t.me https://telegram.org https://oauth.telegram.org; connect-src 'self' https://accounts.google.com https://oauth.telegram.org; font-src 'self' https://fonts.gstatic.com; frame-src https://accounts.google.com https://oauth.telegram.org;" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # API
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            limit_conn perip 20;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API
        location /api/ {
            limit_req zone=api burst=40 nodelay;
            limit_conn perip 50;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Uploads (avatars)
        location /uploads/ {
            proxy_pass http://backend;
            proxy_cache off;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires -1;
        }

        # Frontend — hashed assets (long cache)
        location /assets/ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Frontend — HTML (always revalidate)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
        }
    }
}
