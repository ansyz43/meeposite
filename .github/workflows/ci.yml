name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r bot_worker/requirements.txt

      - name: Lint — syntax check
        run: |
          python -m py_compile backend/app/main.py
          python -m py_compile backend/app/config.py
          python -m py_compile backend/app/models.py
          python -m py_compile backend/app/schemas.py
          python -m py_compile bot_worker/worker/main.py
          python -m py_compile bot_worker/worker/ai_service.py
          python -m py_compile bot_worker/worker/config.py

      - name: Run tests
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production-1234
          DATABASE_URL: "sqlite+aiosqlite:///"
        run: cd backend && python -m pytest tests/ -v --tb=short
