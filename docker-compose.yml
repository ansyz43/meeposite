services:
  db:
    image: postgres:16-alpine
    restart: always
    command: postgres -c max_connections=200 -c shared_buffers=256MB -c work_mem=8MB
    environment:
      POSTGRES_USER: meepo
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: meepo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meepo"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    environment:
      DATABASE_URL: postgresql+asyncpg://meepo:${DB_PASSWORD:?Set DB_PASSWORD in .env}@db:5432/meepo
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY in .env}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      CF_AIG_TOKEN: ${CF_AIG_TOKEN:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      TELEGRAM_BOT_TOKEN_LOGIN: ${TELEGRAM_BOT_TOKEN_LOGIN:-}
      TELEGRAM_API_URL: ${TELEGRAM_API_URL:-}
      INSTAGRAM_USERNAME: ${INSTAGRAM_USERNAME:-}
      INSTAGRAM_PASSWORD: ${INSTAGRAM_PASSWORD:-}
      INSTAGRAM_SESSION_ID: ${INSTAGRAM_SESSION_ID:-}
      INSTAGRAM_PROXY: ${INSTAGRAM_PROXY:-}
      MANAGER_BOT_TOKEN: ${MANAGER_BOT_TOKEN:-}
      MANAGER_BOT_USERNAME: ${MANAGER_BOT_USERNAME:-Fitline01bot}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  bot_worker:
    build: ./bot_worker
    restart: always
    depends_on:
      db:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./knowledge_base:/app/knowledge_base:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://meepo:${DB_PASSWORD:?Set DB_PASSWORD in .env}@db:5432/meepo
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY in .env}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      CF_AIG_TOKEN: ${CF_AIG_TOKEN:-}
      PROXY_SECRET: ${PROXY_SECRET:-}
      TELEGRAM_API_URL: ${TELEGRAM_API_URL:-}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      ALERT_CHAT_ID: ${ALERT_CHAT_ID:-}
      ALERT_BOT_TOKEN: ${ALERT_BOT_TOKEN:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_TELEGRAM_BOT_NAME: ${VITE_TELEGRAM_BOT_NAME:-}
        VITE_TELEGRAM_BOT_ID: ${VITE_TELEGRAM_BOT_ID:-}
    restart: always
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: ${API_URL:-http://localhost:8000}
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
      VITE_TELEGRAM_BOT_NAME: ${VITE_TELEGRAM_BOT_NAME:-}
      VITE_TELEGRAM_BOT_ID: ${VITE_TELEGRAM_BOT_ID:-}

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  uploads_data:
